<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Pacientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Cadastro de Paciente</h2>

    <input type="text" id="nome" placeholder="Nome" autocomplete="name">
    <input type="text" id="celular" placeholder="Celular" autocomplete="tel">
    <input type="email" id="email" placeholder="Email" autocomplete="email">

    <button onclick="cadastrar()">Cadastrar</button>

    <div id="mensagem" class="msg"></div>
</div>

<script>
async function cadastrar() {
    const nome = document.getElementById('nome').value;
    const celular = document.getElementById('celular').value;
    const email = document.getElementById('email').value;
    const msg = document.getElementById('mensagem');

    msg.textContent = '';
    msg.className = 'msg';

    if (!nome || !celular) {
        msg.textContent = 'Preencha nome e celular.';
        msg.classList.add('error');
        return;
    }

    try {
        const response = await fetch('/api/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nome, celular, email })
        });

        const data = await response.json();

        if (response.ok) {
            // ✅ MOSTRAR SUCESSO
            msg.textContent = 'Paciente cadastrado com sucesso!';
            msg.classList.add('success');

            // ✅ LIMPAR CAMPOS
            document.getElementById('nome').value = '';
            document.getElementById('celular').value = '';
            document.getElementById('email').value = '';

        } else {
            msg.textContent = data.error || 'Erro ao cadastrar.';
            msg.classList.add('error');
        }

    } catch (err) {
        msg.textContent = 'Erro de conexão.';
        msg.classList.add('error');
    }
}
</script>

</body>
</html>
